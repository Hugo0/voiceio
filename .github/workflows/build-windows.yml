name: Build Windows Executable

on:
  push:
    tags: ["v*"]
  workflow_dispatch:  # allow manual trigger for testing

permissions:
  contents: write  # needed to upload release assets

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[win,tray]"
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller voiceio.spec

      - name: Verify executable runs (version smoke test)
        shell: pwsh
        run: |
          # Must print a non-empty version string. Catches the class of
          # bugs where the exe exits 0 silently (e.g. missing
          # `if __name__ == "__main__": main()` entry point).
          $out = & dist\voiceio\voiceio.exe --version 2>&1
          Write-Host "Output: $out"
          if (-not $out) {
            Write-Error "voiceio.exe --version produced no output"
            exit 1
          }
          if ($out -notmatch "voiceio") {
            Write-Error "voiceio.exe --version did not print 'voiceio': $out"
            exit 1
          }

      - name: Verify full import chain (doctor)
        shell: pwsh
        run: |
          # `doctor` imports every backend and probes them. This catches
          # missing hidden imports, missing bundled data files, missing
          # DLLs, and Unicode / encoding issues that wouldn't show up in
          # `--version`. Doctor itself exits non-zero when some backends
          # are broken (expected in a headless CI with no audio device),
          # so we ignore its exit code and validate by content: no Python
          # traceback, and the report header is present.
          $out = & dist\voiceio\voiceio.exe doctor 2>&1 | Out-String
          $global:LASTEXITCODE = 0  # swallow doctor's non-zero exit
          Write-Host $out
          if ($out -match "Traceback") {
            Write-Error "voiceio.exe doctor raised a Python traceback"
            exit 1
          }
          if (-not ($out -match "System")) {
            Write-Error "voiceio.exe doctor produced unexpected output (missing 'System' section header)"
            exit 1
          }
          Write-Host "doctor smoke test passed"
          exit 0

      - name: Create zip archive (portable)
        run: Compress-Archive -Path dist\voiceio -DestinationPath dist\voiceio-windows-x64.zip
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
        shell: pwsh

      - name: Build installer
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          if (-not $version) { $version = "dev" }
          iscc /DAppVersion=$version installer.iss
        shell: pwsh

      - name: Upload zip artifact
        uses: actions/upload-artifact@v6
        with:
          name: voiceio-windows-x64
          path: dist/voiceio-windows-x64.zip

      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: voiceio-windows-setup
          path: dist/VoiceIO-*-windows-setup.exe

      - name: Wait for GitHub Release to exist
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          for ($i = 0; $i -lt 30; $i++) {
            $result = gh release view $tag 2>&1
            if ($LASTEXITCODE -eq 0) { Write-Host "Release $tag found"; exit 0 }
            Write-Host "Waiting for release $tag... ($i)"
            Start-Sleep -Seconds 10
          }
          Write-Host "Release not found after 5 min, uploading anyway"
        shell: pwsh

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" dist/voiceio-windows-x64.zip --clobber
          gh release upload "${{ github.ref_name }}" dist/VoiceIO-*-windows-setup.exe --clobber
